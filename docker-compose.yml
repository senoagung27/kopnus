# Buka di browser (Ctrl/Cmd+klik URL di editor):
#   API:     http://localhost:8080
#   MySQL:   http://localhost:8082   (Adminer — Server: mysql atau db, user/sandi = DB_* di bawah)
# Klien TCP (TablePlus, DBeaver): host 127.0.0.1, port 33060 (atau MYSQL_PORT Anda)

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kopnus-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: "${APP_ENV:-local}"
      APP_DEBUG: "${APP_DEBUG:-true}"
      APP_URL: "${APP_URL:-http://localhost:8080}"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: "${DB_DATABASE:-mx100}"
      DB_USERNAME: "${DB_USERNAME:-mx100}"
      DB_PASSWORD: "${DB_PASSWORD:-secret}"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kopnus

  nginx:
    image: nginx:1.25-alpine
    container_name: kopnus-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - kopnus

  mysql:
    image: mysql:8.0
    container_name: kopnus-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-mx100}"
      MYSQL_USER: "${DB_USERNAME:-mx100}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-secret}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-rootsecret}"
    ports:
      - "${MYSQL_PORT:-33060}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      kopnus:
        aliases:
          # Samakan konvensi Laravel Sail (.env DB_HOST=db)
          - db

  adminer:
    image: adminer:4
    container_name: kopnus-adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8082}:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kopnus

networks:
  kopnus:
    driver: bridge

volumes:
  mysql_data:
